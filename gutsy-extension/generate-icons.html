<!doctype html>
<!-- Open this file in Chrome. Click the button — downloads 3 PNG icons.
     Save them into this same folder as icon-16.png, icon-48.png, icon-128.png. -->
<html>
<head>
  <meta charset="utf-8">
  <title>Gutsy icon generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; text-align: center; background: #f9fafb; }
    h1 { font-family: Pacifico, cursive; font-size: 48px; color: #047857; }
    canvas { border: 1px solid #e5e7eb; margin: 8px; background: #fff; }
    button { padding: 12px 24px; background: #047857; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    p { color: #6b7280; max-width: 480px; margin: 16px auto; }
  </style>
</head>
<body>
  <h1>gutsy icons</h1>
  <p>Click below to download 3 PNG icons. Save them into the <code>gutsy-extension/</code> folder with the exact names shown.</p>
  <div>
    <canvas id="c16"  width="16"  height="16"></canvas>
    <canvas id="c48"  width="48"  height="48"></canvas>
    <canvas id="c128" width="128" height="128"></canvas>
  </div>
  <button onclick="downloadAll()">Download all 3</button>

  <script>
    // Wait for Pacifico to load before drawing.
    document.fonts.load('128px Pacifico').then(() => {
      [16, 48, 128].forEach(drawIcon);
    });

    function drawIcon(size) {
      const c = document.getElementById('c' + size);
      const ctx = c.getContext('2d');
      // Green rounded-square background
      const r = size * 0.22;
      ctx.fillStyle = '#047857';
      roundRect(ctx, 0, 0, size, size, r);
      ctx.fill();
      // Pacifico "g"
      ctx.fillStyle = '#ffffff';
      ctx.font = `${Math.floor(size * 0.95)}px Pacifico, cursive`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('g', size / 2, size * 0.54);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    function downloadAll() {
      [16, 48, 128].forEach(size => {
        const c = document.getElementById('c' + size);
        const a = document.createElement('a');
        a.download = `icon-${size}.png`;
        a.href = c.toDataURL('image/png');
        a.click();
      });
    }
  </script>
</body>
</html>
